<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PlantBased Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;1,6..72,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}body{background:#08090a;color:#e0e0e0;font-family:'Instrument Sans',system-ui,sans-serif;min-height:100vh}
.hdr{border-bottom:1px solid #141517;padding:14px 24px}.hdr-in{max-width:900px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
.mn{max-width:900px;margin:0 auto;padding:24px}.crd{background:#0d0e10;border:1px solid #1a1c1f;border-radius:14px;padding:18px;margin-bottom:16px}
.inp{background:#111214;border:1px solid #1e2024;color:#e0e0e0;border-radius:10px;padding:10px 14px;font-size:14px;width:100%;outline:none;font-family:inherit}
.inp:focus{border-color:#3f6212}select.inp{appearance:none;padding-right:34px}
.btn{padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;border:none;transition:all .15s}
.btn-g{background:#3f6212;color:#d9f99d}.btn-g:hover{background:#4d7c0f}
.btn-s{background:#111214;color:#a3e635;border:1px solid #1e2024}.btn-s:hover{background:#151a0f;border-color:#3f6212}
.btn-d{background:#1a0a0a;color:#fca5a5;border:1px solid #7f1d1d44}
.btn:disabled{opacity:.35;cursor:not-allowed}
.tabs{display:flex;gap:2px;background:#0d0e10;border:1px solid #1a1c1f;border-radius:10px;padding:3px;margin-bottom:20px}
.tab{flex:1;padding:8px;border-radius:8px;font-size:13px;font-weight:500;border:none;cursor:pointer;font-family:inherit;background:transparent;color:#555;transition:all .15s}
.tab.on{background:#1e2024;color:#fff}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;text-transform:uppercase;letter-spacing:.06em}
.badge-ready{background:#052e16;color:#86efac}.badge-writing{background:#1a1400;color:#fde68a}.badge-researching{background:#0c1a33;color:#93c5fd}
.badge-reviewing{background:#1a0a33;color:#c4b5fd}.badge-error{background:#1a0a0a;color:#fca5a5}.badge-draft{background:#1a1a1a;color:#888}
.art-card{background:#111214;border:1px solid #1e2024;border-radius:12px;padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.art-card:hover{border-color:#3f6212;background:#12140f}
.type-badge{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 6px;border-radius:4px;margin-right:6px}
.ob{background:#0d0e10;border:1px solid #1a1c1f;border-radius:14px;overflow:hidden;margin-bottom:14px}
.oh{display:flex;justify-content:space-between;align-items:center;padding:11px 15px;border-bottom:1px solid #1a1c1f;background:#0f1012}
.oy{padding:15px}.oy pre{white-space:pre-wrap;word-break:break-word;font-size:12px;line-height:1.7;color:#bbb;font-family:'SF Mono',monospace}
.pv{background:#faf9f7;border-radius:12px;padding:28px;max-width:680px;margin:0 auto}
.pv h1{font-family:'Newsreader',serif;font-size:24px;font-weight:600;color:#1a1a1a;line-height:1.2;margin-bottom:6px}
.pv h2{font-family:'Newsreader',serif;font-size:20px;font-weight:600;color:#1a1a1a;margin:24px 0 10px}
.pv p{font-size:14.5px;line-height:1.85;color:#333;margin-bottom:13px}.pv strong{color:#111;font-weight:600}
.pv a{color:#4d7c0f;text-decoration:underline}.pv blockquote{border-left:3px solid #4d7c0f;padding-left:16px;margin:16px 0;font-style:italic;color:#555}
.pv ul{padding-left:20px;margin:10px 0 14px;color:#333}.pv li{margin-bottom:5px;line-height:1.7}
.lbl{display:block;font-size:11px;font-weight:600;color:#555;letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px}
.row{display:flex;gap:10px;margin-bottom:10px}
.dv{display:flex;align-items:center;gap:12px;color:#333;font-size:12px;font-weight:500;margin:12px 0}.dv::before,.dv::after{content:'';flex:1;height:1px;background:#1e2024}
.empty{text-align:center;padding:48px 20px;color:#444}
.copy-btn{background:#1a1a1a;color:#888;border:1px solid #2a2a2a;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.copy-btn.ok{background:#052e16;color:#86efac;border-color:#14532d}
</style>
</head>
<body>
<header class="hdr"><div class="hdr-in">
<div style="display:flex;align-items:center;gap:10px">
<div style="width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#365314,#4d7c0f);display:flex;align-items:center;justify-content:center;font-size:16px">🌱</div>
<div><div style="font-size:15px;font-weight:700;color:#f0f0f0">PlantBased Agent</div>
<div style="font-size:11px;color:#444" id="status-text">Ready</div></div></div>
<button class="btn btn-g" onclick="refreshArticles()">↻ Refresh</button>
</div></header>

<main class="mn">
<div class="tabs">
<button class="tab on" onclick="switchTab('generate',this)">Find & Rewrite</button>
<button class="tab" onclick="switchTab('queue',this)">Queue</button>
<button class="tab" onclick="switchTab('view',this)">View Article</button>
</div>

<div id="tab-generate">
<div class="crd">
<div style="font-size:13px;font-weight:600;color:#888;margin-bottom:12px">Find articles to rewrite</div>
<div class="row">
<button class="btn btn-s" style="flex:1" onclick="discover()">📡 Find Articles to Rewrite</button>
</div>
<div class="dv">or paste a specific article URL</div>
<div class="row">
<input class="inp" id="inp-url" placeholder="https://plantbasednews.org/..." style="flex:1">
<button class="btn btn-g" onclick="fromURL()">Rewrite This →</button>
</div>
<div class="row" style="margin-top:12px">
<div style="flex:1"><label class="lbl">Language</label>
<select class="inp" id="sel-lang"><option value="sr">🇷🇸 Srpski</option><option value="en">🇬🇧 English</option></select></div>
<div style="flex:1"><label class="lbl">Category</label>
<select class="inp" id="sel-cat"><option>Top Namirnice</option><option>PB Kuhinja</option><option>Recepti</option><option>Zdravlje</option><option>Lifestyle</option><option>Vesti</option></select></div>
<div style="flex:1"><label class="lbl">Length</label>
<select class="inp" id="sel-len"><option value="short">Short</option><option value="medium" selected>Medium</option><option value="long">Long</option></select></div>
</div>
</div>
<div id="ideas-list"></div>
</div>

<div id="tab-queue" style="display:none">
<div id="articles-list"></div>
<div class="empty" id="queue-empty">No articles yet.</div>
</div>

<div id="tab-view" style="display:none">
<div id="article-view"><div class="empty">Select an article from the queue.</div></div>
</div>
</main>

<script>
let currentTab='generate',articles=[],ideas=[],selectedArticle=null;

function switchTab(tab,btn){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
if(btn)btn.classList.add('on');
['generate','queue','view'].forEach(t=>{document.getElementById('tab-'+t).style.display=t===tab?'block':'none'});
if(tab==='queue')refreshArticles()}

function setStatus(t){document.getElementById('status-text').textContent=t}
async function api(path,body=null){
const opts={headers:{'Content-Type':'application/json'}};
if(body){opts.method='POST';opts.body=JSON.stringify(body)}
const r=await fetch('/api'+path,opts);return r.json()}

function copyText(text,btn){
navigator.clipboard.writeText(text);
if(btn){btn.textContent='✓ Copied';btn.classList.add('ok');setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('ok')},1800)}}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

const typeColors={recipe:'#4d7c0f',ingredient:'#ca8a04',health:'#3b82f6',tip:'#8b5cf6',news:'#ef4444',story:'#ec4899'};

async function discover(){
setStatus('Finding articles...');
const cat=document.getElementById('sel-cat').value;
const lang=document.getElementById('sel-lang').value;
try{
const result=await api('/discover',{category:cat,lang});
ideas=Array.isArray(result)?result:[];
renderIdeas();
setStatus(ideas.length>0?'Found '+ideas.length+' articles':'No articles found, try again');
}catch(e){setStatus('Error: '+e.message);ideas=[];renderIdeas()}}

async function fromURL(){
const url=document.getElementById('inp-url').value.trim();
if(!url)return;
generate('Article rewrite','Rewrite from source',url,'')}

function renderIdeas(){
const el=document.getElementById('ideas-list');
if(!ideas||!ideas.length){el.innerHTML='<div class="empty">No articles found. Try again.</div>';return}
el.innerHTML='<div style="font-size:12px;font-weight:600;color:#555;letter-spacing:.06em;text-transform:uppercase;margin:16px 0 8px">Pick an article to rewrite for plantbased.rs</div>'+
ideas.map((idea,i)=>'<div class="art-card" onclick="pickIdea('+i+')">'+
'<div style="margin-bottom:4px">'+
(idea.content_type?'<span class="type-badge" style="background:'+(typeColors[idea.content_type]||'#888')+'22;color:'+(typeColors[idea.content_type]||'#888')+'">'+esc(idea.content_type)+'</span>':'')+
'<span style="font-size:13px;font-weight:600;color:#e0e0e0">'+esc(idea.title)+'</span></div>'+
'<div style="font-size:11px;color:#777;margin-bottom:4px">'+esc(idea.summary||idea.angle||'')+'</div>'+
'<div style="font-size:10px;color:#555">📰 '+(idea.source_url?'<a href="'+esc(idea.source_url)+'" target="_blank" style="color:#888;text-decoration:none">'+esc(idea.source_name||'Source')+' ↗</a>':esc(idea.source_name||''))+(idea.date?' · '+esc(idea.date):'')+'</div>'+
'</div>').join('')}

function pickIdea(idx){
const idea=ideas[idx];
if(!idea||!idea.source_url){setStatus('No source URL for this article');return}
generate(idea.title,idea.summary||idea.angle||'',idea.source_url,idea.content_type||'')}

async function generate(title,angle,sourceUrl,contentType){
const lang=document.getElementById('sel-lang').value;
const cat=document.getElementById('sel-cat').value;
const len=document.getElementById('sel-len').value;
setStatus('Rewriting: '+title.slice(0,40)+'...');
try{
await api('/generate',{title,angle,sourceUrl,lang,category:cat,length:len,tone:50,contentType});
setStatus('Started — check Queue tab in 2-3 minutes');
pollArticles()}catch(e){setStatus('Error: '+e.message)}}

let pollInterval=null;
function pollArticles(){
if(pollInterval)clearInterval(pollInterval);
pollInterval=setInterval(async()=>{
await refreshArticles();
const processing=articles.some(a=>['researching','writing','reviewing'].includes(a.status));
if(!processing){clearInterval(pollInterval);pollInterval=null;setStatus('Ready')}
},10000)}

async function refreshArticles(){
try{articles=await api('/articles');renderArticles()}catch(e){console.error(e)}}

function renderArticles(){
const el=document.getElementById('articles-list');
const empty=document.getElementById('queue-empty');
if(!articles.length){el.innerHTML='';empty.style.display='block';return}
empty.style.display='none';
el.innerHTML=articles.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).map(a=>
'<div class="art-card" onclick="viewArticle(\''+a.id+'\')">'+
'<div style="display:flex;justify-content:space-between;align-items:center">'+
'<div><div style="font-size:13px;font-weight:600;color:#e0e0e0;margin-bottom:3px">'+esc(a.title||'Untitled')+'</div>'+
'<div style="font-size:11px;color:#666">'+(a.lang==='sr'?'🇷🇸':'🇬🇧')+' '+esc(a.category||'')+' · '+new Date(a.createdAt).toLocaleDateString()+'</div></div>'+
'<span class="badge badge-'+a.status+'">'+a.status+'</span></div></div>').join('')}

async function viewArticle(id){
switchTab('view');
try{
const a=await api('/articles/'+id);
selectedArticle=a;renderArticleView(a)}catch(e){document.getElementById('article-view').innerHTML='<div class="empty">Error loading</div>'}}

function renderArticleView(a){
const el=document.getElementById('article-view');
if(a.status!=='ready'){
el.innerHTML='<div class="crd" style="text-align:center;padding:24px"><span class="badge badge-'+a.status+'" style="font-size:12px;padding:4px 12px">'+a.status+'</span><div style="margin-top:12px;color:#666;font-size:13px">'+(a.status==='error'?'Error: '+(a.error||'unknown'):a.title||'Processing...')+'</div></div>';return}

el.innerHTML=
'<div style="display:flex;gap:8px;margin-bottom:14px">'+
'<span class="badge badge-ready">Ready</span>'+
(a.seoScore?'<span style="font-size:11px;color:#888">SEO: '+a.seoScore+'/100</span>':'')+
(a.sourceCount?'<span style="font-size:11px;color:#888">Sources: '+a.sourceCount+'</span>':'')+
(a.sourceUrl?'<a href="'+esc(a.sourceUrl)+'" target="_blank" style="font-size:11px;color:#555;text-decoration:none">Original ↗</a>':'')+
'</div>'+

'<div class="ob"><div class="oh"><span style="font-size:11px;font-weight:600;color:#666;letter-spacing:.06em;text-transform:uppercase">Title</span>'+
'<button class="copy-btn" onclick="copyText(\''+esc(a.title)+'\',this)">Copy</button></div>'+
'<div class="oy"><div style="font-size:15px;font-weight:600;color:#e0e0e0">'+esc(a.title)+'</div></div></div>'+

'<div class="ob"><div class="oh"><span style="font-size:11px;font-weight:600;color:#666;letter-spacing:.06em;text-transform:uppercase">Meta ('+(a.meta||'').length+'/160)</span>'+
'<button class="copy-btn" onclick="copyText(\''+esc(a.meta)+'\',this)">Copy</button></div>'+
'<div class="oy"><div style="font-size:12px;color:#999">'+esc(a.meta)+'</div></div></div>'+

'<div class="ob" id="html-block"><div class="oh"><span style="font-size:11px;font-weight:600;color:#666;letter-spacing:.06em;text-transform:uppercase">Body HTML</span>'+
'<button class="copy-btn" onclick="copyHTML()">Copy HTML</button></div>'+
'<div class="oy" style="max-height:260px;overflow:auto"><pre>'+esc(a.html||'')+'</pre></div></div>'+

'<div class="ob"><div class="oh"><span style="font-size:11px;font-weight:600;color:#666;letter-spacing:.06em;text-transform:uppercase">Preview</span></div>'+
'<div style="padding:18px"><div class="pv"><h1>'+esc(a.title)+'</h1>'+
'<p style="font-size:11px;color:#999;font-style:italic">'+esc(a.meta)+'</p>'+
'<hr style="border:none;border-top:1px solid #e5e5e5;margin:12px 0 18px">'+(a.html||'')+'</div></div></div>'+

'<div style="display:flex;gap:8px;margin-top:8px">'+
'<button class="btn btn-d" onclick="deleteArt(\''+a.id+'\')">Delete</button></div>'}

function copyHTML(){if(selectedArticle&&selectedArticle.html){
const btn=document.querySelector('#html-block .copy-btn');
navigator.clipboard.writeText(selectedArticle.html);
if(btn){btn.textContent='✓ Copied';btn.classList.add('ok');setTimeout(()=>{btn.textContent='Copy HTML';btn.classList.remove('ok')},1800)}}}

async function deleteArt(id){if(!confirm('Delete?'))return;
await fetch('/api/articles/'+id,{method:'DELETE'});switchTab('queue');refreshArticles()}

refreshArticles();
</script>
</body>
</html>
